<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2e7d32">
<title>متابعة زبائن عمي عادل</title>
<style>
:root { color-scheme: light; --green:#2e7d32; --green-d:#1b5e20; --wa:#25d366; --wa-d:#128c7e; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background:#f0f4f8; color:#1a1a1a; font-size:18px; line-height:1.6; padding:12px; min-height:100vh; }
.container { max-width: 720px; margin: 0 auto; }

header { background: linear-gradient(135deg, var(--green) 0%, var(--green-d) 100%); color:white; padding:18px 16px; border-radius:16px; margin-bottom:14px; box-shadow:0 4px 12px rgba(0,0,0,.15); text-align:center; }
header h1 { font-size:26px; font-weight:800; margin-bottom:4px; }
header p { font-size:15px; opacity:.95; }

.settings-card { background:white; border-radius:14px; padding:14px; margin-bottom:14px; box-shadow:0 2px 6px rgba(0,0,0,.06); }
.settings-card details summary { font-size:17px; font-weight:700; color:var(--green-d); cursor:pointer; padding:6px 0; list-style:none; display:flex; align-items:center; justify-content:space-between; }
.settings-card details summary::-webkit-details-marker { display:none; }
.settings-card details[open] summary::after { content:"▲"; }
.settings-card details summary::after { content:"▼"; font-size:13px; }
.settings-body { margin-top:12px; padding-top:12px; border-top:1px solid #eceff1; }
.field { margin-bottom:10px; }
.field label { display:block; font-size:14px; font-weight:700; color:#37474f; margin-bottom:5px; }
.field input { width:100%; padding:10px 12px; border:2px solid #cfd8dc; border-radius:10px; font-size:15px; font-family:inherit; direction:ltr; text-align:left; }
.field input:focus { outline:none; border-color:var(--green); }
.btn-save { background:var(--green); color:white; border:none; padding:11px 20px; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; width:100%; margin-top:6px; }

.tabs { display:flex; gap:8px; margin-bottom:14px; background:white; border-radius:14px; padding:6px; box-shadow:0 2px 6px rgba(0,0,0,.06); }
.tab { flex:1; padding:14px 6px; font-size:17px; font-weight:700; border:none; background:transparent; color:#455a64; border-radius:10px; cursor:pointer; font-family:inherit; transition:all .2s; }
.tab.active { background:var(--green); color:white; }
.tab .badge { display:inline-block; background:#ff5252; color:white; border-radius:999px; padding:2px 9px; margin-right:5px; font-size:13px; min-width:24px; }
.tab.active .badge { background:rgba(255,255,255,.3); }

.toolbar { display:flex; gap:8px; margin-bottom:12px; }
.toolbar input { flex:1; padding:12px 14px; border:2px solid #cfd8dc; border-radius:12px; font-size:16px; font-family:inherit; background:white; box-shadow:0 2px 6px rgba(0,0,0,.06); }
.btn-reload { background:#1976d2; color:white; border:none; padding:12px 16px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:0 2px 6px rgba(0,0,0,.06); }

.status-msg { background:#fff3cd; color:#856404; padding:12px; border-radius:10px; text-align:center; margin-bottom:12px; font-weight:600; }
.status-msg.error { background:#f8d7da; color:#721c24; }
.status-msg.success { background:#d4edda; color:#155724; }
.status-msg.info { background:#cce7ff; color:#004085; }

#debug { display:none; background:#263238; color:#80cbc4; padding:12px; border-radius:10px; margin-bottom:12px; font-family:monospace; font-size:12px; direction:ltr; text-align:left; overflow:auto; max-height:200px; }
#debug pre { white-space:pre-wrap; word-break:break-all; margin-top:8px; }

.card { background:white; border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 3px 10px rgba(0,0,0,.08); border-right:6px solid var(--green); }
.card.done { border-right-color:#9e9e9e; opacity:.85; }
.card.saving { border-right-color:#ff9800; }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:12px; }
.card-name { font-size:22px; font-weight:800; color:var(--green-d); flex:1; }
.card-date { font-size:12px; color:#78909c; white-space:nowrap; }
.phone-row { display:flex; gap:8px; margin-bottom:14px; align-items:center; }
.phone-num { flex:1; font-size:20px; font-weight:700; color:#0277bd; background:#e3f2fd; padding:10px 14px; border-radius:10px; direction:ltr; text-align:center; letter-spacing:1px; }
.btn-call { background:#00897b; color:white; border:none; padding:10px 16px; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }

.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:16px; font-weight:700; color:#37474f; margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 14px; border:2px solid #cfd8dc; border-radius:10px; font-size:18px; font-family:inherit; background:#fafafa; color:#1a1a1a; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--green); background:white; }
.form-group textarea { min-height:80px; resize:vertical; }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px; }
.btn { padding:14px 12px; border:none; border-radius:12px; font-size:16px; font-weight:800; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; justify-content:center; gap:6px; text-decoration:none; }
.btn-wa { background:var(--wa); color:white; grid-column:span 2; font-size:18px; padding:16px; }
.btn-wa:active { background:var(--wa-d); }
.btn-done { background:#ff9800; color:white; }
.btn-done:active { background:#f57c00; }
.btn-undo { background:#607d8b; color:white; grid-column:span 2; }
.btn:disabled { opacity:.6; cursor:not-allowed; }

.empty { text-align:center; padding:40px 20px; color:#78909c; font-size:18px; background:white; border-radius:14px; }
.empty-emoji { font-size:48px; margin-bottom:8px; }

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--green); color:white; padding:12px 24px; border-radius:30px; font-size:16px; font-weight:700; box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:1000; opacity:0; transition:opacity .3s; max-width:90%; text-align:center; }
.toast.show { opacity:1; }
.toast.error { background:#d32f2f; }

.save-indicator { display:inline-block; font-size:13px; padding:3px 10px; border-radius:12px; margin-right:8px; vertical-align:middle; }
.save-indicator.saving { background:#fff3cd; color:#856404; }
.save-indicator.saved { background:#d4edda; color:#155724; }
.save-indicator.error { background:#f8d7da; color:#721c24; }

@media (max-width: 480px) {
  body { font-size:17px; padding:8px; }
  header h1 { font-size:22px; }
  .card-name { font-size:20px; }
  .row-2 { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>🌿 متابعة زبائن عمي عادل</h1>
  <p>اتصال - تفاصيل - ارسال للواتساب</p>
</header>

<div class="settings-card">
  <details id="settingsBox">
    <summary>⚙️ الإعدادات</summary>
    <div class="settings-body">
      <div class="field">
        <label>📱 رقم واتساب عمي عادل (بصيغة دولية)</label>
        <input type="text" id="adelPhone" value="+9647713738173" placeholder="+9647xxxxxxxxx">
      </div>
      <div class="field">
        <label>🔗 رابط Google Apps Script</label>
        <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>
      <button class="btn-save" onclick="saveSettings()">💾 حفظ الإعدادات</button>
    </div>
  </details>
</div>

<div class="tabs">
  <button class="tab active" data-tab="pending" onclick="switchTab('pending')">
    <span class="badge" id="pendingCount">0</span>قيد المتابعة
  </button>
  <button class="tab" data-tab="done" onclick="switchTab('done')">
    <span class="badge" id="doneCount">0</span>تم التحويل
  </button>
</div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 ابحث بالاسم او الرقم..." oninput="renderList()">
  <button class="btn-reload" onclick="loadSheet()" title="تحديث">🔄</button>
</div>

<div id="status" class="status-msg" style="display:none;"></div>

<div id="debug">
  <strong style="color:#ffab91;">DEBUG:</strong>
  <pre></pre>
</div>

<div id="list"></div>

</div>
<div id="toast" class="toast"></div>

<script>
const SHEET_FILE_ID_FALLBACK = '1fx6Be3l0mBU-SKPSddR2hWz4AchTvl4Bq3POsJHNj_A';
const STORAGE_KEY     = 'amiAdel_local_v2';
const ADEL_PHONE_KEY  = 'amiAdel_phone';
const API_URL_KEY     = 'amiAdel_apiUrl';
const TAB_KEY         = 'amiAdel_tab';

let allRows = [];
let localState = {}; // {id: {sentToAdel, sentAt}}
let currentTab = localStorage.getItem(TAB_KEY) || 'pending';
let apiUrl = localStorage.getItem(API_URL_KEY) || '';
let adelPhone = localStorage.getItem(ADEL_PHONE_KEY) || '+9647713738173';

document.getElementById('apiUrl').value = apiUrl;
document.getElementById('adelPhone').value = adelPhone;

// لو ما في رابط API محفوظ، افتح الإعدادات تلقائياً
if (!apiUrl) document.getElementById('settingsBox').open = true;

try { localState = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { localState = {}; }

function saveSettings() {
  apiUrl = document.getElementById('apiUrl').value.trim();
  adelPhone = document.getElementById('adelPhone').value.trim();
  localStorage.setItem(API_URL_KEY, apiUrl);
  localStorage.setItem(ADEL_PHONE_KEY, adelPhone);
  showToast('✅ تم حفظ الإعدادات');
  document.getElementById('settingsBox').open = false;
  loadSheet();
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status-msg ' + (type || '');
  s.style.display = msg ? 'block' : 'none';
}

function showDebug(data) {
  const d = document.getElementById('debug');
  d.style.display = 'block';
  d.querySelector('pre').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
}

function switchTab(tab) {
  currentTab = tab;
  localStorage.setItem(TAB_KEY, tab);
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  renderList();
}

function rowId(r) {
  return (r.phone || '').replace(/\D/g, '') + '_' + (r.date || '');
}

function isDone(r) {
  return (localState[rowId(r)] && localState[rowId(r)].sentToAdel) || r.transfer === 'تم';
}

function updateCounts() {
  let p=0, d=0;
  allRows.forEach(r => isDone(r) ? d++ : p++);
  document.getElementById('pendingCount').textContent = p;
  document.getElementById('doneCount').textContent = d;
}

// ====== تحميل البيانات ======
async function loadSheet() {
  setStatus('⏳ جاري تحميل البيانات...', 'info');
  try {
    let rows;
    if (apiUrl) {
      rows = await loadFromApi();
    } else if (window.cowork && window.cowork.callMcpTool) {
      rows = await loadFromCowork();
    } else {
      setStatus('⚠️ ادخل رابط Apps Script بالإعدادات لتحميل البيانات', 'error');
      document.getElementById('settingsBox').open = true;
      return;
    }
    allRows = rows;
    if (allRows.length === 0) {
      setStatus('⚠️ ما في زبائن بالشيت', 'error');
    } else {
      setStatus('✅ تم تحميل ' + allRows.length + ' زبون', 'success');
      setTimeout(() => setStatus(''), 1800);
    }
    updateCounts();
    renderList();
  } catch (e) {
    setStatus('❌ خطأ بالتحميل: ' + (e.message || e), 'error');
    showDebug(e.stack || e.toString());
  }
}

async function loadFromApi() {
  const res = await fetch(apiUrl + '?t=' + Date.now(), { method: 'GET' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'API error');
  return (data.rows || []).map(r => normalizeRow(r));
}

async function loadFromCowork() {
  const result = await window.cowork.callMcpTool(
    'mcp__0bbaaa7f-7f7d-471e-a78e-1ed56170192e__read_file_content',
    { fileId: SHEET_FILE_ID_FALLBACK }
  );
  const content = extractMcpContent(result);
  return parseMarkdownTable(content);
}

function extractMcpContent(result) {
  if (!result) return '';
  if (typeof result === 'string') return result;
  if (Array.isArray(result.content)) {
    const txt = result.content.map(c => (c && c.text) || '').filter(Boolean).join('\n');
    try { const p = JSON.parse(txt); if (p.fileContent) return p.fileContent; } catch(e){}
    return txt;
  }
  if (result.fileContent) return result.fileContent;
  return JSON.stringify(result);
}

function parseMarkdownTable(content) {
  const lines = content.split('\n').filter(l => l.trim().startsWith('|'));
  const data = lines.slice(1).filter(l => !/^\|[\s:|-]+\|$/.test(l.trim()));
  return data.map(line => {
    const cells = line.split('|').slice(1, -1).map(c => c.trim());
    while (cells.length < 8) cells.push('');
    const [date, name, phone, status, area, quality, notes, transfer] = cells;
    return normalizeRow({
      'التاريخ': date, 'الاسم': name, 'الرقم': phone, 'الحالة': status,
      'المنطقة': (area === '\\-' || area === '-') ? '' : area,
      'الجودة': quality, 'الملاخظات': notes, 'التحويل': transfer
    });
  }).filter(r => r.name && r.phone);
}

function normalizeRow(r) {
  return {
    date: r['التاريخ'] || r.date || '',
    name: r['الاسم'] || r.name || '',
    phone: r['الرقم'] || r.phone || '',
    status: r['الحالة'] || r.status || '',
    area: r['المنطقة'] || r.area || '',
    quality: r['الجودة'] || r.quality || '',
    notes: r['الملاخظات'] || r['الملاحظات'] || r.notes || '',
    transfer: r['التحويل'] || r.transfer || ''
  };
}

// ====== الكتابة على الشيت ======
async function saveToSheet(row, fields) {
  if (!apiUrl) return { ok: false, error: 'no_api' };
  try {
    const body = JSON.stringify({
      action: 'update',
      date: row.date,
      phone: row.phone,
      ...fields
    });
    const res = await fetch(apiUrl, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: body
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'فشل');
    return data;
  } catch (e) {
    return { ok: false, error: e.message || e };
  }
}

// ====== العرض ======
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderList() {
  const list = document.getElementById('list');
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = allRows.filter(r => currentTab === 'done' ? isDone(r) : !isDone(r));

  if (search) {
    filtered = filtered.filter(r =>
      (r.name||'').toLowerCase().includes(search) ||
      (r.phone||'').toLowerCase().includes(search) ||
      (r.area||'').toLowerCase().includes(search)
    );
  }

  filtered.reverse(); // الأحدث اولاً

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-emoji">${currentTab==='done'?'📋':'✨'}</div><div>${currentTab==='done'?'ما في زبائن محولة':'ما في زبائن قيد المتابعة'}</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(renderCard).join('');
}

function renderCard(r) {
  const id = rowId(r);
  const done = isDone(r);
  const phoneDigits = (r.phone || '').replace(/\D/g, '');
  const phoneCall = phoneDigits.startsWith('0') ? '+964' + phoneDigits.slice(1) : phoneDigits;
  const safeId = id.replace(/[^a-zA-Z0-9_]/g, '');

  return `
  <div class="card ${done?'done':''}" data-id="${escapeHtml(id)}" id="card-${safeId}">
    <div class="card-header">
      <div class="card-name">
        ${escapeHtml(r.name)}
        <span class="save-indicator" id="ind-${safeId}" style="display:none;"></span>
      </div>
      <div class="card-date">${escapeHtml(r.date)}</div>
    </div>

    <div class="phone-row">
      <div class="phone-num">${escapeHtml(r.phone)}</div>
      <a class="btn-call" href="tel:${phoneCall}">📞 اتصال</a>
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>📍 المنطقة</label>
        <input type="text" placeholder="مثال: حي الجامعة" value="${escapeHtml(r.area)}"
               data-field="area" data-id="${escapeHtml(id)}"
               onblur="autoSave(this)">
      </div>
      <div class="form-group">
        <label>⭐ الجودة</label>
        <select data-field="quality" data-id="${escapeHtml(id)}" onchange="autoSave(this)">
          <option value="" ${r.quality===''?'selected':''}>--اختار--</option>
          <option value="مؤهل" ${r.quality==='مؤهل'?'selected':''}>مؤهل</option>
          <option value="غير مؤهل" ${r.quality==='غير مؤهل'?'selected':''}>غير مؤهل</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>📝 الملاحظات / التفاصيل</label>
      <textarea placeholder="مثال: 200 متر مصفر يريد تطوير، التواصل بكره..."
                data-field="notes" data-id="${escapeHtml(id)}"
                onblur="autoSave(this)">${escapeHtml(r.notes)}</textarea>
    </div>

    <div class="actions">
      ${done ? `
        <button class="btn btn-undo" onclick="markUndone('${escapeHtml(id)}')">🔄 ارجاع لقيد المتابعة</button>
      ` : `
        <button class="btn btn-wa" onclick="sendWhatsApp('${escapeHtml(id)}')">💬 ارسال لعمي عادل وتعليم تم</button>
        <button class="btn btn-done" onclick="markDone('${escapeHtml(id)}')" style="grid-column:span 2;">✅ تم بدون واتساب</button>
      `}
    </div>
  </div>`;
}

// ====== التفاعل ======
function findRow(id) { return allRows.find(r => rowId(r) === id); }

function setIndicator(safeId, state, text) {
  const el = document.getElementById('ind-' + safeId);
  if (!el) return;
  el.style.display = 'inline-block';
  el.className = 'save-indicator ' + state;
  el.textContent = text;
  if (state === 'saved') {
    setTimeout(() => { el.style.display = 'none'; }, 2000);
  }
}

async function autoSave(input) {
  const id = input.dataset.id;
  const field = input.dataset.field;
  const value = input.value;
  const row = findRow(id);
  if (!row) return;

  // حدث محلياً
  row[field] = value;

  if (!apiUrl) return; // لا حفظ بالشيت بدون رابط

  const safeId = id.replace(/[
